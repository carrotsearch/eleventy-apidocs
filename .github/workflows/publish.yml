name: Publish to npm
run-name: "Publish @carrotsearch/eleventy-apidocs by ${{ github.actor }}${{ inputs.dry-run == true && ' (dry run)' || '' }}"

# Manual-only. The version in apidocs/package.json is the source of truth:
# bump and commit it first, then dispatch this workflow. dry-run defaults to
# true so an accidental click packs and validates without publishing.
on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Dry run (pack and validate, do not publish)"
        type: boolean
        default: true

# Never let two publishes overlap; queue rather than cancel so an in-flight
# publish always runs to completion.
concurrency:
  group: publish-npm
  cancel-in-progress: false

env:
  DRY_RUN: "${{ inputs.dry-run == true && '--dry-run' || '' }}"

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read
      # Mints the OIDC token npm exchanges for a short-lived publish
      # credential. No NPM_TOKEN secret is stored anywhere — npmjs.com is
      # configured with this repo + workflow as a trusted publisher.
      id-token: write

    steps:
      - uses: actions/checkout@v7

      - uses: ./.github/actions/setup

      # Gate the publish on the same checks CI runs, so we never ship a build
      # that wouldn't pass on main.
      - run: pnpm exec biome ci

      - run: pnpm test

      - uses: ./.github/actions/build-site

      # Prereleases (1.2.0-rc.1) must not move the `latest` tag; route any
      # version containing a hyphen to `next` instead.
      - name: Resolve dist-tag
        id: tag
        run: |
          VERSION=$(node -p "require('./apidocs/package.json').version")
          TAG=latest
          if [[ "$VERSION" == *-* ]]; then
            TAG=next
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      # --provenance attaches a signed build attestation; it works here only
      # because this repo is public. --no-git-checks skips pnpm's clean-tree
      # guard (the build writes into the tree before we publish).
      - name: Publish
        working-directory: apidocs
        run: pnpm publish --tag "${{ steps.tag.outputs.tag }}" --provenance --no-git-checks ${{ env.DRY_RUN }}

      # If the OIDC exchange or publish fails, the npm/pnpm logs are the only
      # way to see why — surface them as an artifact.
      - name: Upload npm debug logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: npm-debug-logs
          path: |
            /home/runner/.npm/_logs/
            /home/runner/.local/share/pnpm/logs/
          if-no-files-found: ignore
